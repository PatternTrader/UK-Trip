<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Site Selector</title>
<style>
  :root {
    --bg: #f4f1ea;
    --ink: #1d2530;
    --card: #ffffff;
    --line: #d7dde7;
    --link: #103860;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    font-family: "Segoe UI", Tahoma, sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 24px;
  }

  .panel {
    width: min(680px, 92vw);
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--card);
    padding: 24px;
  }

  h1 {
    margin: 0 0 8px;
    font-size: 1.8rem;
  }

  p {
    margin: 0 0 18px;
    color: #4a5666;
  }

  .links {
    display: grid;
    gap: 10px;
  }

  a {
    display: block;
    border: 1px solid #b8c4d3;
    border-radius: 10px;
    padding: 12px 14px;
    text-decoration: none;
    color: var(--link);
    font-weight: 700;
    background: #f8fbff;
  }

  a:hover {
    background: #edf5ff;
  }
</style>
</head>
<body>
  <main class="panel">
    <h1>Trip Website Versions</h1>
    <p>Select which version you want to open.</p>
    <div class="links">
      <a href="uk-trip-site/index.html">UK Trip Site (Full UK)</a>
      <a href="england-only-site/index.html">England-Only Site</a>
    </div>
  </main>
</body>
</html>
